spring.application.name=SS-College

server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://dpg-xxxxxxxx-a.oregon-postgres.render.com:5432/sscollege
spring.datasource.username=sscollege_user
spring.datasource.password=YOUR_REAL_PASSWORD

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
