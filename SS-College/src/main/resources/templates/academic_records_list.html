<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS College - Academic Records</title>
    <link rel="icon" type="image/png" th:href="@{/img/icons8-college-30.png}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            background-image: url('../img/list2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        .close-btn {
            position: fixed; top: 20px; right: 20px;
            background: rgba(0,0,0,0.7); color: white; border: none;
            border-radius: 50%; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; z-index: 1001;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .close-btn:hover { background: rgba(0,0,0,0.9); transform: scale(1.1); }
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239aa9b8' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }
        .container { position: relative; z-index: 2; max-width: 1400px; margin: 0 auto; }
        .card {
            border: none; border-radius: 25px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            backdrop-filter: blur(2px);
        }
        .card-header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white; padding: 18px 25px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-header h3 { font-weight: 600; margin: 0; }
        .card-header .btn-light {
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
            color: white; border-radius: 30px; padding: 6px 18px;
            transition: all 0.3s ease;
        }
        .card-header .btn-light:hover { background: white; color: #1e3c72; transform: translateY(-2px); }
        .card-body { padding: 25px; background-color: #ffffff; }
        .table { margin-bottom: 0; border-radius: 15px; overflow: hidden; }
        .table thead th {
            background: linear-gradient(135deg, #f8faff, #f0f4ff);
            color: #1e3c72; font-weight: 600; border-bottom: 2px solid #d0d9f0;
            text-transform: uppercase; font-size: 0.8rem; padding: 15px 10px;
        }
        .table tbody tr:hover { background-color: #f5f9ff !important; }
        .badge-pass, .badge-fail {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 30px; font-weight: 500;
            font-size: 0.85rem;
        }
        .badge-pass { background: linear-gradient(135deg, #28a745, #20c997); color: white; }
        .badge-fail { background: linear-gradient(135deg, #dc3545, #e4606d); color: white; }
        .badge-grade {
            background: linear-gradient(135deg, #6c5ce7, #a463f5);
            color: white; padding: 6px 12px; border-radius: 30px;
            display: inline-flex; align-items: center; gap: 5px;
        }
        @media (max-width: 768px) {
            .card-header { flex-direction: column; gap: 15px; align-items: start !important; }
            .table thead { display: none; }
            .table tbody tr { display: block; margin-bottom: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
            .table tbody td { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border: none; border-bottom: 1px solid #eee; }
            .table tbody td:before { content: attr(data-label); font-weight: 600; color: #1e3c72; width: 40%; }
            .close-btn { top: 15px; right: 15px; width: 45px; height: 45px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<button class="close-btn" onclick="window.location.href='/mainpage'" title="Close">
    <i class="fas fa-times"></i>
</button>

<div class="container">
    <div class="card shadow-sm">
        <div class="card-header">
            <h3><i class="fas fa-graduation-cap me-2"></i>Academic Records</h3>
            <a th:href="@{/academic_record}" class="btn btn-light btn-sm">
                <i class="fas fa-plus-circle me-1"></i> Add New Record
            </a>
        </div>
        <div class="card-body">
            <div th:if="${msg}" class="alert alert-success alert-dismissible fade show">
                <i class="fas fa-check-circle me-2"></i> <span th:text="${msg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${err}" class="alert alert-danger alert-dismissible fade show">
                <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${err}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="table-responsive">
                <table class="table table-hover table-striped align-middle">
                    <thead>
                        <tr>
                            <th>NO</th><th>Student ID</th><th>Student Name</th><th>Semester</th>
                            <th>Department</th><th>Subject</th><th>Intern Mark</th><th>Exam Mark</th>
                            <th>Total Mark</th><th>Status</th><th>Grade</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="rec, stat : ${academicRecords}">
                            <td data-label="#" th:text="${stat.count}"></td>
                            <td data-label="Student ID" th:text="${rec.id}"></td>
                            <td data-label="Student Name" th:text="${rec.name}"></td>
                            <td data-label="Semester" th:text="${rec.sem}"></td>
                            <td data-label="Department" th:text="${rec.dep}"></td>
                            <td data-label="Subject" th:text="${rec.subject}"></td>
                            <td data-label="Internal" th:text="${rec.imark}"></td>
                            <td data-label="Exam" th:text="${rec.mark}"></td>
                            <td data-label="Total" th:text="${rec.total}"></td>
                            <td data-label="Status">
                                <span th:if="${rec.status == 'Pass'}" class="badge-pass">
                                    <i class="fas fa-check-circle"></i> Pass
                                </span>
                                <span th:if="${rec.status == 'Fail'}" class="badge-fail">
                                    <i class="fas fa-times-circle"></i> Fail
                                </span>
                            </td>
                            <td data-label="Grade">
                                <span class="badge-grade">
                                    <i class="fas fa-star"></i> <span th:text="${rec.grade}"></span>
                                </span>
                            </td>
                            <td data-label="Actions">
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/academic/edit/{id}(id=${rec.id})}" class="btn btn-outline-primary" title="Edit">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a th:href="@{/academic/delete/{id}(id=${rec.id})}" class="btn btn-outline-danger" title="Delete">
                                        <i class="fas fa-trash-alt"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(academicRecords)}">
                            <td colspan="12" class="text-center py-5 text-muted">
                                <i class="fas fa-inbox fa-3x mb-3"></i><br>No academic records found.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    setTimeout(function() {
        document.querySelectorAll('.alert').forEach(alert => {
            bootstrap.Alert.getOrCreateInstance(alert).close();
        });
    }, 5000);
</script>
</body>
</html>
