<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Staff Login Page</title>
    <link rel="icon" type="image/png" th:href="@{/img/icons8-college-30.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ---------- Your original styles (unchanged) ---------- */
        body {
            background-image: url('../img/header.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1001;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .close-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: scale(1.1);
        }
        .close-btn:active {
            transform: scale(0.95);
        }
        .container {
            max-width: 500px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
            margin-top: 1rem;
        }
        .card-header {
            background: linear-gradient(135deg, #556B2F 0%, #6B8E23 100%);
            color: white;
            border: none;
            padding: 1rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .card-header h3 {
            margin: 0;
            font-weight: 700;
            font-size: 1.5rem;
        }
        .card-header i {
            font-size: 1.5rem;
        }
        .card-body {
            padding: 1.5rem;
        }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-weight: 500;
            text-align: center;
        }
        .alert-danger {
            background-color: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
        }
        .alert-success {
            background-color: #d1e7dd;
            color: #0f5132;
            border: 1px solid #badbcc;
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .form-label i {
            color: #556B2F;
            font-size: 0.9rem;
        }
        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            width: 100%;
            opacity: 0.5;
        }
        .form-control:focus {
            border-color: #6B8E23;
            box-shadow: 0 0 0 0.25rem rgba(107, 142, 35, 0.25);
            opacity: 1;
        }
        .input-group {
            position: relative;
            width: 100%;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        .btn-primary {
            background: linear-gradient(135deg, #556B2F 0%, #6B8E23 100%);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(107, 142, 35, 0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: auto;
            min-width: 150px;
            margin: 0 auto;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #6B8E23 0%, #556B2F 100%);
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(107, 142, 35, 0.4);
        }
        .btn-primary:active {
            transform: translateY(-1px);
        }
        .action-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #e0e0e0;
            flex-wrap: wrap;
        }
        .action-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #556B2F;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 0.4rem 1.2rem;
            border-radius: 10px;
            background: rgba(85, 107, 47, 0.1);
            font-size: 0.9rem;
        }
        .action-link:hover {
            color: #6B8E23;
            background: rgba(85, 107, 47, 0.2);
            text-decoration: none;
            transform: translateY(-2px);
        }
        .action-link i {
            font-size: 1rem;
        }
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .card { margin-top: 0.5rem; }
            .card-header { padding: 0.8rem; }
            .card-body { padding: 1.2rem; }
            .close-btn { top: 15px; right: 15px; width: 45px; height: 45px; font-size: 1.3rem; }
            .input-group { max-width: 250px; }
        }
        @media (max-width: 480px) {
            .card-header h3 { font-size: 1.3rem; }
            .btn-primary { padding: 0.5rem 1.2rem; font-size: 0.9rem; min-width: 130px; }
            .form-control { padding: 0.5rem 0.7rem 0.5rem 2.2rem; }
            .close-btn { top: 10px; right: 10px; width: 40px; height: 40px; font-size: 1.2rem; }
            .action-links { flex-direction: column; gap: 8px; }
            .action-link { width: 100%; justify-content: center; }
            .input-group { max-width: 220px; }
        }
        /* Additional style for user detail card (new) */
        .user-detail-card {
            background: #eaf7e6;
            border-left: 5px solid #6B8E23;
            border-radius: 12px;
            padding: 12px;
            margin: 15px 0;
            display: none;
            font-size: 0.9rem;
        }
        .spinner-small {
            display: none;
            font-size: 0.75rem;
            margin-left: 10px;
            color: #6B8E23;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-sign-in-alt"></i>
                        <h3> Staff Login</h3>
                    </div>
                    <div class="card-body">
                        <div th:if="${err}" class="alert alert-danger" th:text="${err}"></div>
                        <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>

                        <form th:action="@{/admin_login}" method="post">
                            <!-- Mobile Number field with AJAX -->
                            <div class="mb-3">
                                <label for="mobile" class="form-label">
                                    <i class="fas fa-user"></i> Mobile Number
                                </label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="mobile" name="mobile" required
                                           placeholder="Enter Register Mobile Number">
                                    <span class="spinner-small" id="spinner"><i class="fas fa-spinner fa-spin"></i></span>
                                </div>
                            </div>

                            <!-- Auto-fetched user details card -->
                            <div id="userDetailsCard" class="user-detail-card">
                                <p><i class="fas fa-user-circle"></i> <strong>Name:</strong> <span id="userName">-</span></p>
                                <p><i class="fas fa-building"></i> <strong>Role:</strong> <span id="userRole">-</span></p>
                                <p><i class="fas fa-phone"></i> <strong>Mobile:</strong> <span id="userMobile">-</span></p>
                                <small class="text-muted"><i class="fas fa-shield-alt"></i> Only Admin role is allowed to login</small>
                            </div>

                            <!-- Password field -->
                            <div class="mb-3">
                                <label for="pass" class="form-label">
                                    <i class="fas fa-lock"></i> Password
                                </label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="pass" name="pass" required
                                           placeholder="Enter password">
                                </div>
                            </div>

                            <!-- Role field as dropdown -->
                            <div class="mb-3">
                                <label for="dep" class="form-label">
                                    <i class="fas fa-building"></i> Role
                                </label>
                                <div class="input-group">
                                    <select class="form-control" id="dep" name="dep" required>
                                        <option value="" disabled selected>-- Select Role --</option>
                                        <option value="Admin">Admin</option>
                                        <option value="Teacher">Teacher</option>   
                                        <option value="Clerk">Staff</option>
                                        
                                    </select>
                                </div>
                            </div>

                            <br>
                            <div class="text-center mt-3">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-sign-in-alt"></i> Login
                                </button>
                            </div>
                        </form>

                        <div class="action-links">
                            <a th:href="@{/}" class="action-link">
                                <i class="fas fa-home"></i> Home
                            </a>
                            <a th:href="@{/admin_register}" class="action-link">
                                <i class="fas fa-user-plus"></i> Register
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const mobileInput = document.getElementById('mobile');
        const userCard = document.getElementById('userDetailsCard');
        const userNameSpan = document.getElementById('userName');
        const userRoleSpan = document.getElementById('userRole');
        const userMobileSpan = document.getElementById('userMobile');
        const spinner = document.getElementById('spinner');
        const roleSelect = document.getElementById('dep');

        mobileInput.addEventListener('blur', function() {
            const mobile = this.value.trim();
            if (mobile.length < 10) {
                userCard.style.display = 'none';
                return;
            }
            spinner.style.display = 'inline-block';
            fetch(`/api/user/${mobile}`)
                .then(response => {
                    if (!response.ok) {
                        if (response.status === 404) throw new Error('User not found');
                        if (response.status === 403) throw new Error('Access denied – Only Admin allowed');
                        throw new Error('Server error');
                    }
                    return response.json();
                })
                .then(data => {
                    userNameSpan.textContent = data.name;
                    userRoleSpan.textContent = data.dep;
                    userMobileSpan.textContent = data.mobile;
                    userCard.style.display = 'block';
                    // Auto-select role if matches
                    if (data.dep === 'Admin') roleSelect.value = 'Admin';
                    else if (data.dep === 'Teacher') roleSelect.value = 'Teacher';
                    else if (data.dep === 'Accountant') roleSelect.value = 'Accountant';
                    else if (data.dep === 'Librarian') roleSelect.value = 'Librarian';
                })
                .catch(error => {
                    userCard.style.display = 'none';
                    let errDiv = document.getElementById('ajaxError');
                    if (!errDiv) {
                        errDiv = document.createElement('div');
                        errDiv.id = 'ajaxError';
                        errDiv.className = 'text-danger small mt-1';
                        mobileInput.parentNode.parentNode.appendChild(errDiv);
                    }
                    errDiv.innerText = error.message;
                    setTimeout(() => errDiv.remove(), 3000);
                })
                .finally(() => {
                    spinner.style.display = 'none';
                });
        });
    </script>
</body>
</html>
