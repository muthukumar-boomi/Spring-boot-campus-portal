<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS College - Fees Records</title>
      <link rel="icon" type="image/png" th:href="@{/img/icons8-college-30.png}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
           font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            /* Background image added */
            background-image: url('../img/list5.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Close Button */
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .close-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: scale(1.1);
        }
        .close-btn:active {
            transform: scale(0.95);
        }

        /* subtle pattern overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%233b82f6' fill-opacity='0.03'%3E%3Cpath d='M0 0h40v40H0V0zm40 40h40v40H40V40z'/%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* main card – glassmorphic effect */
        .fees-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            box-shadow: 0 30px 60px -10px rgba(0,20,40,0.3), 0 10px 25px -8px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.5);
            overflow: hidden;
        }

        .card-header-custom {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 1.2rem 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: none;
        }
        .card-header-custom h3 {
            margin: 0;
            font-weight: 600;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card-header-custom h3 i {
            font-size: 2rem;
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 50%;
        }
        .btn-add {
            background: white;
            color: #1e3c72;
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-decoration: none;
        }
        .btn-add:hover {
            background: #f0f4ff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            color: #0f2b4f;
        }

        /* table styling - no scrollbar, fixed layout */
        .table-responsive {
            overflow-x: visible; /* remove horizontal scroll */
        }
        .table {
            width: 100%;
            table-layout: fixed; /* distribute columns evenly */
            margin-bottom: 0;
            word-wrap: break-word;
        }
        .table thead th {
            background: #f8fafd;
            color: #1e3c72;
            font-weight: 600;
            font-size: 0.8rem; /* slightly smaller to fit */
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 2px solid #dbeafe;
            padding: 0.75rem 0.4rem; /* reduced padding */
            vertical-align: middle;
            white-space: normal; /* allow wrapping */
            word-break: break-word;
        }
        .table thead th i {
            margin-right: 4px;
            color: #3b82f6;
            font-size: 0.9rem;
        }
        .table tbody td {
            vertical-align: middle;
            padding: 0.75rem 0.4rem;
            background-color: white;
            border-bottom: 1px solid #eef2f6;
            font-size: 0.85rem;
            word-break: break-word;
        }
        .table tbody tr:hover td {
            background-color: #f5f9ff;
        }

        /* column width hints (adjust as needed) */
        .table th:nth-child(1) { width: 4%; }   /* # */
        .table th:nth-child(2) { width: 7%; }   /* Student ID */
        .table th:nth-child(3) { width: 8%; }   /* Name */
        .table th:nth-child(4) { width: 7%; }   /* Fee Type */
        .table th:nth-child(5) { width: 7%; }   /* Due Date */
        .table th:nth-child(6) { width: 6%; }   /* Total */
        .table th:nth-child(7) { width: 6%; }   /* Paid */
        .table th:nth-child(8) { width: 7%; }   /* Balance */
        .table th:nth-child(9) { width: 7%; }   /* Payment Date */
        .table th:nth-child(10) { width: 6%; }  /* Mode */
        .table th:nth-child(11) { width: 7%; }  /* Status */
        .table th:nth-child(12) { width: 12%; } /* Actions */

        /* badges */
        .badge-paid {
            background: linear-gradient(145deg, #28a745, #20c997);
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            display: inline-block;
        }
        .badge-pending {
            background: linear-gradient(145deg, #ffc107, #fd7e14);
            color: #212529;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            display: inline-block;
        }
        .badge-partial {
            background: linear-gradient(145deg, #17a2b8, #138496);
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            display: inline-block;
        }
        .badge-overdue {
            background: linear-gradient(145deg, #dc3545, #e4606d);
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            display: inline-block;
        }

        /* action buttons - smaller */
        .btn-group-sm .btn-outline-primary,
        .btn-group-sm .btn-outline-danger,
        .btn-group-sm .btn-outline-success {
            border-width: 2px;
            border-radius: 30px;
            padding: 4px 8px;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .btn-outline-primary {
            border-color: #2a5298;
            color: #2a5298;
        }
        .btn-outline-primary:hover {
            background: #2a5298;
            color: white;
        }
        .btn-outline-danger {
            border-color: #dc3545;
            color: #dc3545;
        }
        .btn-outline-danger:hover {
            background: #dc3545;
            color: white;
        }
        .btn-outline-success {
            border-color: #28a745;
            color: #28a745;
        }
        .btn-outline-success:hover {
            background: #28a745;
            color: white;
        }

        /* empty state */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #6c7a8a;
        }
        .empty-state i {
            font-size: 3.5rem;
            color: #a0b3cc;
            margin-bottom: 1rem;
        }

        /* footer */
        .card-footer-custom {
            background: #f8fafd;
            padding: 1rem 1.8rem;
            color: #4b5565;
            border-top: 1px solid #dbeafe;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        /* responsive */
        @media (max-width: 768px) {
            .card-header-custom {
                flex-direction: column;
                align-items: start;
                gap: 15px;
            }
            .close-btn {
                top: 15px;
                right: 15px;
                width: 45px;
                height: 45px;
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <!-- Close Button -->
    <button class="close-btn" onclick="window.location.href='/mainpage'" title="Close">
        <i class="fas fa-times"></i>
    </button>

    <div class="container">
        <div class="fees-card">
            <!-- HEADER with "Add New Fee" button -->
            <div class="card-header-custom">
                <h3><i class="fas fa-credit-card"></i>  Fees Records</h3>
                <a th:href="@{/fees}" class="btn-add">
                    <i class="fas fa-plus-circle"></i> Add New Fees
                </a>
            </div>

            <!-- Message area -->
            <div class="px-4 pt-4">
                <div th:if="${msg}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-2"></i> <span th:text="${msg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${err}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${err}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            </div>

            <!-- Fees Table - no scrollbar -->
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Fees Type</th>
                            <th>Due Date</th>
                            <th>Total</th>
                            <th>Paid</th>
                            <th>Balance</th>
                            <th>Payment Date</th>
                            <th>Mode</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="fee, stat : ${fees}">
                            <td th:text="${stat.count}">1</td>
                            <td th:text="${fee.id}">STU001</td>
                            <td th:text="${fee.name}">John Doe</td>
                            <td th:text="${fee.ftype}">Tuition</td>
                            <td th:text="${fee.ddate}">2025-06-30</td>
                            
                            <!-- Total -->
                            <td th:text="${#numbers.formatDecimal(new java.math.BigDecimal(fee.rs), 1, 2)}">5000.00</td>
                            
                            <!-- Paid -->
                            <td th:text="${#numbers.formatDecimal(new java.math.BigDecimal(fee.pamount), 1, 2)}">5000.00</td>
                            
                            <!-- Balance -->
                            <td th:text="${#numbers.formatDecimal(new java.math.BigDecimal(fee.rs).subtract(new java.math.BigDecimal(fee.pamount)), 1, 2)}">0.00</td>
                            
                            <td th:text="${fee.pdate}">2025-06-15</td>
                            <td th:text="${fee.pmode}">Online</td>
                            <td>
                                <span th:if="${fee.status == 'Paid'}" class="badge-paid">Paid</span>
                                <span th:if="${fee.status == 'Pending'}" class="badge-pending">Pending</span>
                                <span th:if="${fee.status == 'Partial'}" class="badge-partial">Partial</span>
                                <span th:if="${fee.status == 'Overdue'}" class="badge-overdue">Overdue</span>
                            </td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/fees/edit/{id}(id=${fee.id})}" class="btn btn-outline-primary" title="Edit">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <!-- Delete link without confirmation popup -->
                                    <a th:href="@{/fees/delete/{id}(id=${fee.id})}" class="btn btn-outline-danger" title="Delete">
                                        <i class="fas fa-trash-alt"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(fees)}">
                            <td colspan="12" class="empty-state">
                                <i class="fas fa-inbox"></i><br>
                                No fee records found.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Footer -->
            <div class="card-footer-custom">
                <i class="fas fa-clock" style="color: #3b82f6;"></i> Last updated: 
                <span th:text="${#dates.format(#dates.createNow(), 'dd-MM-yyyy HH:mm')}"></span>
            </div>
        </div> <!-- end fees-card -->
    </div> <!-- end container -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-hide alerts after 5 seconds
        setTimeout(function() {
            document.querySelectorAll('.alert').forEach(alert => {
                bootstrap.Alert.getOrCreateInstance(alert).close();
            });
        }, 5000);
    </script>
</body>
</html>
