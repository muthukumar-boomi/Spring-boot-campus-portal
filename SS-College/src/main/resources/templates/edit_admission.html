<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS College - Edit Admission</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-edit me-2"></i>Edit Admission Record</h3>
            </div>
            <div class="card-body">
                <!-- Update form – posts to /admission/update -->
                <form th:action="@{/admission/update}" method="post">
                    <!-- Row 1: ID (readonly) + Date -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Admission ID</label>
                            <input type="text" class="form-control" name="id" th:value="${admission.id}" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Date</label>
                            <input type="date" class="form-control" name="date" th:value="${admission.date}" required>
                        </div>
                    </div>

                    <!-- Row 2: Admission Type -->
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label class="form-label">Admission Type</label>
                            <select class="form-select" name="atype" required>
                                <option value="Regular" th:selected="${admission.atype == 'Regular'}">Regular</option>
                                <option value="Management" th:selected="${admission.atype == 'Management'}">Management</option>
                                <option value="Lateral" th:selected="${admission.atype == 'Lateral'}">Lateral</option>
                            </select>
                        </div>
                    </div>

                    <!-- Row 3: Student Name (First + Last) -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" name="name" th:value="${admission.name}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" name="lname" th:value="${admission.lname}" required>
                        </div>
                    </div>

                    <!-- Row 4: DOB + Gender -->
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" name="dob" th:value="${admission.dob}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Gender</label>
                            <select class="form-select" name="gender" required>
                                <option value="Male" th:selected="${admission.gender == 'Male'}">Male</option>
                                <option value="Female" th:selected="${admission.gender == 'Female'}">Female</option>
                                <option value="Other" th:selected="${admission.gender == 'Other'}">Other</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Blood Group</label>
                            <input type="text" class="form-control" name="blood" th:value="${admission.blood}" placeholder="e.g. O+">
                        </div>
                    </div>

                    <!-- Row 5: Email + Mobile -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" th:value="${admission.email}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Mobile</label>
                            <input type="text" class="form-control" name="mobile" th:value="${admission.mobile}" required>
                        </div>
                    </div>

                    <!-- Row 6: Course + Department -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Course</label>
                            <input type="text" class="form-control" name="course" th:value="${admission.course}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Department</label>
                            <input type="text" class="form-control" name="dep" th:value="${admission.dep}" required>
                        </div>
                    </div>

                    <!-- Row 7: Address -->
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" name="address" rows="2" required th:text="${admission.address}"></textarea>
                        </div>
                    </div>

                    <!-- Row 8: Academic Year + Semester -->
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Academic Year</label>
                            <input type="text" class="form-control" name="ayear" th:value="${admission.ayear}" placeholder="e.g. 2024-25" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Semester</label>
                            <input type="text" class="form-control" name="sem" th:value="${admission.sem}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Roll Number</label>
                            <input type="text" class="form-control" name="rnumber" th:value="${admission.rnumber}" required>
                        </div>
                    </div>

                    <!-- Row 9: Section + Father's Name -->
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Section</label>
                            <input type="text" class="form-control" name="section" th:value="${admission.section}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Father's Name</label>
                            <input type="text" class="form-control" name="fname" th:value="${admission.fname}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Mother's Name</label>
                            <input type="text" class="form-control" name="mname" th:value="${admission.mname}" required>
                        </div>
                    </div>

                    <!-- Row 10: Parent/Guardian Phone -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Parent/Guardian Phone</label>
                            <input type="text" class="form-control" name="ph" th:value="${admission.ph}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Accommodation</label>
                            <select class="form-select" name="accommodation" required>
                                <option value="Day Scholar" th:selected="${admission.accommodation == 'Day Scholar'}">Day Scholar</option>
                                <option value="Hosteller" th:selected="${admission.accommodation == 'Hosteller'}">Hosteller</option>
                            </select>
                        </div>
                    </div>

                    <!-- Row 11: Previous College + Work Experience -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Previous College</label>
                            <input type="text" class="form-control" name="pcollege" th:value="${admission.pcollege}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Work Experience</label>
                            <input type="text" class="form-control" name="work" th:value="${admission.work}" placeholder="Years / Details">
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="row mt-4">
                        <div class="col-md-12 text-center">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="fas fa-save me-2"></i>Update Admission
                            </button>
                            <a th:href="@{/admission}" class="btn btn-secondary px-4 ms-2">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
